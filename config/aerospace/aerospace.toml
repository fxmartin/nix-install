# ABOUTME: AeroSpace tiling window manager configuration
# ABOUTME: Universal layout — works across standard, power, and ai-assistant profiles
#
# Reference: https://nikitabobko.github.io/AeroSpace/guide
# Workspace layout:
#   1 Terminal — Ghostty
#   2 Code     — cmux, VSCode
#   3 Editor   — Zed
#   4 AI       — Claude, ChatGPT, Perplexity, Inferencer
#   5 Web      — Chrome, Chrome for Testing, Arc, Brave, Firefox, Safari, Preview
#   6 Mail     — Outlook, Mail
#   7 Office   — Microsoft Teams, Word, Excel, PowerPoint
#   8 Chat     — Telegram, WhatsApp
#   9 Misc     — System Settings, 1Password, Finder, Calculator, Calendar, Docker, NordVPN

# Start AeroSpace at login (replaces the need for macOS Login Items entry)
start-at-login = true

# Normalize nested containers automatically — easier tiling behavior
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Default layout for new workspaces: tiles, auto orientation (horizontal on wide, vertical on tall)
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Padding between accordion-layout windows
accordion-padding = 30

# Mouse follows focus (disable if it feels jumpy)
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Notify SketchyBar whenever the focused workspace changes so the bar updates
exec-on-workspace-change = ['/bin/bash', '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE',
]

# Pin workspaces to monitors. When the named monitor is absent (laptop
# undocked, for instance), the workspace falls back to the only available one.
#   main      — the monitor that carries the macOS menu bar (arranged in
#               System Settings → Displays). On a MacBook with no external
#               display this is the built-in panel.
#   secondary — the first non-main monitor (external display when docked).
[workspace-to-monitor-force-assignment]
1 = 'main'       # Terminal
2 = 'main'       # Code
3 = 'main'       # Editor
4 = 'secondary'  # AI
5 = 'secondary'  # Web
6 = 'secondary'  # Mail
7 = 'secondary'  # Office
8 = 'main'       # Chat
9 = 'main'       # Misc

# Gaps between tiles (0 = flush edges; bump to 4–8 for breathing room)
[gaps]
inner.horizontal = 4
inner.vertical   = 4
outer.left       = 4
outer.right      = 4
# Per-monitor outer.top: the MacBook's notch already reserves ~44px, so only
# 4px is needed on the built-in. External displays need 41px (37px SketchyBar
# + 4px breathing room). Any unmatched monitor falls back to the trailing 41.
outer.top = [
    { monitor."built-in" = 4 },
    41,
]
outer.bottom     = 4

# ============================================================================
# Main mode — the default keybindings you use day to day
# ============================================================================
[mode.main.binding]

# --- Focus (vim-style hjkl) ---
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# --- Move window within workspace ---
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# --- Resize focused window ---
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# --- Workspace switch (1..9) ---
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# --- Send focused window to workspace (1..9) ---
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# Jump back to the previous workspace
alt-tab       = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# --- Layout (letter keys avoid AZERTY / non-US punctuation conflicts) ---
alt-t = 'layout tiles horizontal vertical'      # toggle tiles / cycle orientation
alt-a = 'layout accordion horizontal vertical'  # toggle accordion / cycle orientation

alt-shift-t     = 'layout tiles'            # force tiles (from accordion/floating)
alt-shift-a     = 'layout accordion'        # force accordion
alt-shift-f     = 'fullscreen'              # AeroSpace fullscreen (keeps SketchyBar)
alt-shift-space = 'layout floating tiling'  # float/unfloat the current window

# --- Service mode: reload, reset, close-all-but-current ---
alt-shift-semicolon = 'mode service'

[mode.service.binding]
esc       = ['reload-config', 'mode main']
r         = ['flatten-workspace-tree', 'mode main']
f         = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

# Join with neighbor, then back to main
alt-shift-h = ['join-with left',  'mode main']
alt-shift-j = ['join-with down',  'mode main']
alt-shift-k = ['join-with up',    'mode main']
alt-shift-l = ['join-with right', 'mode main']

# ============================================================================
# App → workspace assignments
# ============================================================================
# Bundle IDs verified via: osascript -e 'id of app "<Name>"'
# To add a new rule: open the app, then run `aerospace list-apps` to confirm ID.

# --- Workspace 1: Terminal ---
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'move-node-to-workspace 1'

# --- Workspace 2: Code ---
[[on-window-detected]]
if.app-id = 'com.cmuxterm.app'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = 'move-node-to-workspace 2'

# --- Workspace 3: Editor ---
[[on-window-detected]]
if.app-id = 'dev.zed.Zed'
run = ['move-node-to-workspace 3', 'layout accordion']

# --- Workspace 4: AI ---
[[on-window-detected]]
if.app-id = 'com.anthropic.claudefordesktop'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-id = 'com.openai.chat'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-id = 'ai.perplexity.mac'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-id = 'com.inferencer'
run = 'move-node-to-workspace 4'

# --- Workspace 5: Web ---
[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = ['move-node-to-workspace 5', 'layout accordion']

[[on-window-detected]]
if.app-id = 'com.google.chrome.for.testing'
run = ['move-node-to-workspace 5', 'layout accordion']

[[on-window-detected]]
if.app-id = 'company.thebrowser.Browser'  # Arc
run = ['move-node-to-workspace 5', 'layout accordion']

[[on-window-detected]]
if.app-id = 'com.brave.Browser'
run = ['move-node-to-workspace 5', 'layout accordion']

[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'
run = ['move-node-to-workspace 5', 'layout accordion']

[[on-window-detected]]
if.app-id = 'com.apple.Safari'
run = ['move-node-to-workspace 5', 'layout accordion']

[[on-window-detected]]
if.app-id = 'com.apple.Preview'
run = ['move-node-to-workspace 5', 'layout accordion']

# --- Workspace 6: Mail ---
[[on-window-detected]]
if.app-id = 'com.microsoft.Outlook'
run = ['move-node-to-workspace 6', 'layout accordion']

[[on-window-detected]]
if.app-id = 'com.apple.mail'
run = ['move-node-to-workspace 6', 'layout accordion']

# --- Workspace 7: Office ---
[[on-window-detected]]
if.app-id = 'com.microsoft.teams2'
run = 'move-node-to-workspace 7'

[[on-window-detected]]
if.app-id = 'com.microsoft.Word'
run = 'move-node-to-workspace 7'

[[on-window-detected]]
if.app-id = 'com.microsoft.Excel'
run = 'move-node-to-workspace 7'

[[on-window-detected]]
if.app-id = 'com.microsoft.Powerpoint'
run = 'move-node-to-workspace 7'

# --- Workspace 8: Chat (messaging) ---
[[on-window-detected]]
if.app-id = 'ru.keepcoder.Telegram'
run = 'move-node-to-workspace 8'

[[on-window-detected]]
if.app-id = 'net.whatsapp.WhatsApp'
run = 'move-node-to-workspace 8'

# --- Workspace 9: Misc (float-friendly utility apps) ---
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = ['layout floating', 'move-node-to-workspace 9']

[[on-window-detected]]
if.app-id = 'com.1password.1password'
run = 'move-node-to-workspace 9'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = ['layout floating', 'move-node-to-workspace 9']

[[on-window-detected]]
if.app-id = 'com.apple.calculator'
run = ['layout floating', 'move-node-to-workspace 9']

[[on-window-detected]]
if.app-id = 'com.apple.iCal'
run = 'move-node-to-workspace 9'

[[on-window-detected]]
if.app-id = 'com.electron.dockerdesktop'
run = ['layout floating', 'move-node-to-workspace 9']

[[on-window-detected]]
if.app-id = 'com.nordvpn.macos'
run = ['layout floating', 'move-node-to-workspace 9']
