# ABOUTME: GitHub Actions workflow for release version metadata checks
# ABOUTME: Fails when VERSION, documentation, and setup.sh drift

name: Version Check

on:
  push:
    branches:
      - main
    paths:
      - 'VERSION'
      - 'README.md'
      - 'CLAUDE.md'
      - 'setup.sh'
      - 'scripts/verify-version.sh'
      - '.github/workflows/version-check.yml'
  pull_request:
    paths:
      - 'VERSION'
      - 'README.md'
      - 'CLAUDE.md'
      - 'setup.sh'
      - 'scripts/verify-version.sh'
      - '.github/workflows/version-check.yml'
  workflow_dispatch:

jobs:
  version-check:
    name: Verify Version Metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Verify version metadata
        run: ./scripts/verify-version.sh
