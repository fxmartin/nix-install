# ABOUTME: GitHub Actions workflow to validate Nix flake on PRs and pushes
# ABOUTME: Catches broken Nix configs before they reach main branch

name: Nix Flake Check

on:
  push:
    branches: [main]
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - 'darwin/**'
      - 'home-manager/**'
      - 'Claude'
      - 'tests/**'
      - 'Makefile'
      - '.github/workflows/nix-flake-check.yml'
  pull_request:
    branches: [main]
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - 'darwin/**'
      - 'home-manager/**'
      - 'Claude'
      - 'tests/**'
      - 'Makefile'
      - '.github/workflows/nix-flake-check.yml'
  workflow_dispatch:

jobs:
  flake-check:
    name: Validate Nix Flake
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@a7ad9c4f0c65208097f4d34f3cfa1913b80cce5c # main

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@76aaf8814cdb385b86597c32b8c51b66b69b0839 # main

      - name: Run repository quality gate
        run: nix develop --command make check
