# ABOUTME: GitHub Actions workflow for release version metadata checks
# ABOUTME: Fails when VERSION, documentation, and setup.sh drift

name: Version Check

on:
  push:
    branches:
      - main
    paths:
      - 'VERSION'
      - 'README.md'
      - 'CLAUDE.md'
      - 'setup.sh'
      - 'scripts/verify-version.sh'
      - '.github/workflows/version-check.yml'
  pull_request:
    paths:
      - 'VERSION'
      - 'README.md'
      - 'CLAUDE.md'
      - 'setup.sh'
      - 'scripts/verify-version.sh'
      - '.github/workflows/version-check.yml'
  workflow_dispatch:

jobs:
  version-check:
    name: Verify Version Metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify version metadata
        run: ./scripts/verify-version.sh
