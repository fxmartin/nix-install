# ABOUTME: Gitleaks configuration for nix-install repository
# ABOUTME: Allowlists known false positives from vendored libraries

[extend]
  useDefault = true

[allowlist]
  description = "nix-install global allowlist"
  commits = [
    # Historical docs examples used the placeholder text
    # `Authorization: token YOUR_TOKEN`; these are not real credentials.
    '''c12cebb688a3e5567da7194d6d74abd3c9928985''',
    '''82d6a815526d15aa04d1e89dde369cdc15d320e2''',
    '''d75706e0ba5605817ba3c13aae911fef6862f505''',
    '''c6fadc31285e9007b31083e031c93e82ce7eb911''',
    # Vendored oscrypto source removed from the tracked tree; four detections
    # in this historical import are false positives in asymmetric-key APIs.
    '''4a14b43c931b3a327efd80bfe256714ef5d6c172''',
  ]
  paths = [
    # Binary Calibre plugin release assets are scanned upstream before vendoring.
    '''config/calibre/plugins/[^/]+\.zip''',
    # Synthetic test fixture — contains fabricated credentials for bats test coverage only
    '''tests/fixtures/leaked-key\.txt''',
    # Claude Code agent worktrees — ephemeral scratch space, not committed to main
    '''config/claude-code-config/\.claude/worktrees/''',
  ]
